apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hivebox
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/mehmoodhaq7/hivebox
    targetRevision: main
    path: helm/hivebox

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true