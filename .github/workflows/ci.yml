name: CI Pipeline

on:
  push:
    branches: ["main", "phase-*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: python -m pytest tests/test_app.py -v --cov=src --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pylint
        run: pip install pylint

      - name: Run pylint
        run: pylint src/ --fail-under=7.0

  lint-dockerfile:
    name: Lint Dockerfile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  scan-k8s:
    name: Scan K8s Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Terrascan
        uses: tenable/terrascan-action@main
        with:
          iac_type: k8s
          iac_dir: k8s/
          only_warn: true

  docker:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint, lint-dockerfile]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hivebox:0.0.1 .

      - name: Run container
        run: docker run -d -p 8080:8080 --name hivebox hivebox:0.0.1

      - name: Wait for container
        run: sleep 5

      - name: Test /version endpoint
        run: curl -f http://localhost:8080/version

      - name: Stop container
        run: docker stop hivebox

  integration-test:
    name: Integration Tests on KIND
    runs-on: ubuntu-latest
    needs: [docker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create KIND cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: hivebox
          config: kind-config.yaml

      - name: Build Docker image
        run: docker build -t hivebox:0.0.1 .

      - name: Load image into KIND
        run: kind load docker-image hivebox:0.0.1 --name hivebox

      - name: Install Ingress-Nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=90s

      - name: Deploy infrastructure
        run: |
          kubectl apply -k kustomize/infrastructure/overlays/local
          kubectl wait --for=condition=available deployment/valkey --timeout=60s
          kubectl wait --for=condition=available deployment/minio --timeout=60s

      - name: Deploy HiveBox
        run: |
          helm upgrade --install hivebox helm/hivebox \
            --set image.pullPolicy=Never \
            --set image.tag=0.0.1 \
            --set image.repository=hivebox
          kubectl wait --for=condition=available deployment/hivebox --timeout=120s
      - name: Port forward Valkey and MinIO
        run: |
          kubectl port-forward svc/valkey 6379:6379 &
          kubectl port-forward svc/minio 9000:9000 &
          sleep 5
      - name: Run integration tests
        run: python -m pytest tests/test_integration.py -v
  e2e-test:
    name: E2E Tests with Venom
    runs-on: ubuntu-latest
    needs: [integration-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create KIND cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: hivebox
          config: kind-config.yaml

      - name: Build Docker image
        run: docker build -t hivebox:0.0.1 .

      - name: Load image into KIND
        run: kind load docker-image hivebox:0.0.1 --name hivebox

      - name: Install Ingress-Nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=90s
      - name: Deploy HiveBox
        run: |
          helm upgrade --install hivebox helm/hivebox \
            --set image.pullPolicy=Never \
            --set image.tag=0.0.1 \
            --set image.repository=hivebox
          kubectl wait --for=condition=ready pod -l app=hivebox --timeout=120s
      - name: Install Venom
        run: |
          curl -L https://github.com/ovh/venom/releases/download/v1.1.0/venom.linux-amd64 -o /usr/local/bin/venom
          chmod +x /usr/local/bin/venom
      - name: Port forward HiveBox
        run: kubectl port-forward svc/hivebox 8080:8080 &
      - name: Wait for port forward
        run: sleep 5
      - name: Run E2E tests
        run: venom run tests/e2e/hivebox.yaml --var url=http://localhost:8080
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
